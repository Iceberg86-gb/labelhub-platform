spring:
  application:
    name: labelhub-api
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/labelhub?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${MYSQL_USER:labelhub}
    password: ${MYSQL_PASSWORD:labelhub}
  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: ["*:missing"]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${LABELHUB_API_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

labelhub:
  ai:
    active-provider: ${LABELHUB_AI_PROVIDER:mock}
    openai-compatible:
      base-url: ${AI_BASE_URL:}
      api-key: ${AI_API_KEY:}
      model-name: ${AI_MODEL_NAME:}
      provider-name: ${AI_PROVIDER_NAME:openai-compatible}
      estimated-cost-per-call: ${AI_COST_PER_CALL:0.001}
      timeout: ${AI_TIMEOUT:30s}
      max-attempts: ${AI_MAX_ATTEMPTS:3}
      base-delay: ${AI_BASE_DELAY:1000ms}
    pricing:
      currency: USD
      models:
        deepseek-v4-flash:
          input-cache-hit-per-1m-usd: 0.0028
          input-cache-miss-per-1m-usd: 0.14
          output-per-1m-usd: 0.28
        deepseek-v4-pro:
          # DeepSeek notes this 75% discounted price remains active until 2026-05-31 15:59 UTC.
          input-cache-hit-per-1m-usd: 0.003625
          input-cache-miss-per-1m-usd: 0.435
          output-per-1m-usd: 0.87
    provider-secrets:
      master-key: ${LABELHUB_LLM_PROVIDER_MASTER_KEY:}
  security:
    jwt-secret: ${JWT_SECRET:dev-only-32-bytes-minimum-secret-please-change-me}
    jwt-ttl-hours: ${JWT_TTL_HOURS:1}
    refresh-ttl-days: ${REFRESH_TTL_DAYS:7}
    internal-token: ${LABELHUB_INTERNAL_TOKEN:dev-internal-token}
  object-storage:
    endpoint: ${OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${OBJECT_STORAGE_REGION:us-east-1}
    access-key: ${OBJECT_STORAGE_ACCESS_KEY:}
    secret-key: ${OBJECT_STORAGE_SECRET_KEY:}
    bucket: ${OBJECT_STORAGE_BUCKET:labelhub-exports}
    path-style-access: ${OBJECT_STORAGE_PATH_STYLE:true}
