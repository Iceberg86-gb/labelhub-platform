  /exports/snapshots/{snapshotId}/files/{fileName}:
    get:
      tags: [Exports]
      operationId: downloadExportSnapshotFile
      parameters:
        - $ref: '#/components/parameters/SnapshotId'
        - name: fileName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download an immutable file from a previously generated export snapshot.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /exports/snapshots/{snapshotId}/diff:
    get:
      tags: [Exports]
      operationId: diffExportSnapshots
      parameters:
        - $ref: '#/components/parameters/SnapshotId'
        - name: compareWith
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Hash-level reproducibility diff between two export snapshots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportSnapshotDiff'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /internal/ai-review/results:
    post:
      tags: [Internal]
      operationId: reportAiReviewResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalAiReviewResultRequest'
      responses:
        '204':
          description: AI result persisted.
  /internal/ai-review/submissions/{submissionId}/context:
    get:
      tags: [Internal]
      operationId: getAiReviewContext
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: Submission AI review context for the outbox worker.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalAiReviewContext'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SchemaId:
      name: schemaId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SchemaVersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SnapshotId:
      name: snapshotId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ProviderConfigId:
      name: providerConfigId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    ErrorBadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ErrorUnauthorized:
      description: Missing, expired, or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ErrorForbidden:
      description: Authenticated user is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ErrorNotFound:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ErrorStateConflict:
      description: Request conflicts with the current business state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ErrorPayloadTooLarge:
      description: Response would exceed the supported export limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    LlmProviderConfig:
      type: object
      required: [id, scope, providerType, providerName, modelName, enabled, hasSecret, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        scope:
          type: string
          enum: [platform, owner]
          description: Provider ownership scope. Platform-scoped providers are managed by PLATFORM_ADMIN and used across LabelHub.
        providerType:
          type: string
          minLength: 1
        providerName:
          type: string
          minLength: 1
        baseUrl:
          type: string
          nullable: true
        modelName:
          type: string
          minLength: 1
        enabled:
          type: boolean
        hasSecret:
          type: boolean
        secretLast4:
          type: string
          nullable: true
          minLength: 1
          maxLength: 4
        secretUpdatedAt:
          type: string
          format: date-time
          nullable: true
        secretRef:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LlmProviderConfigRequest:
      type: object
      required: [providerType, providerName, modelName]
      properties:
        providerType:
          type: string
          minLength: 1
          maxLength: 64
        providerName:
          type: string
          minLength: 1
          maxLength: 128
        baseUrl:
          type: string
          nullable: true
          maxLength: 512
        modelName:
          type: string
          minLength: 1
          maxLength: 128
        secret:
          type: string
          nullable: true
          writeOnly: true
          maxLength: 4096
        secretRef:
          type: string
          nullable: true
          maxLength: 512
        enabled:
          type: boolean
          default: true
    LlmProviderTestConnectionRequest:
      type: object
      required: [providerType, providerName, modelName]
      properties:
        providerType:
          type: string
          minLength: 1
          maxLength: 64
        providerName:
          type: string
          minLength: 1
          maxLength: 128
        baseUrl:
          type: string
          nullable: true
          maxLength: 512
        modelName:
          type: string
          minLength: 1
          maxLength: 128
        secret:
          type: string
          nullable: true
          writeOnly: true
          maxLength: 4096
        secretRef:
          type: string
          nullable: true
          maxLength: 512
        timeoutSeconds:
          type: integer
          format: int32
          minimum: 1
          maximum: 30
          default: 10
    LlmProviderTestConnectionResponse:
      type: object
      required: [ok, providerName, modelName]
