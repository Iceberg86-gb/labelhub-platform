          items:
            type: integer
            format: int64
        verdict:
          type: string
          enum: [approve, reject]
        reviewLevel:
          $ref: '#/components/schemas/ReviewLevel'
        reason:
          type: string
          nullable: true
    BatchReviewResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BatchReviewItemResult'
    BatchReviewItemResult:
      type: object
      required: [submissionId, status]
      properties:
        submissionId:
          type: integer
          format: int64
        status:
          type: string
          enum: [created, self_review_not_allowed, not_found]
        ledgerEntryId:
          type: integer
          format: int64
          nullable: true
        error:
          type: string
          nullable: true
    CreateTaskExportRequest:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          description: Export data scope. Defaults to approved_only.
          enum: [approved_only, full]
          default: approved_only
        fieldMapping:
          $ref: '#/components/schemas/ExportFieldMapping'
    ExportFieldMapping:
      type: object
      additionalProperties: false
      description: Export business-table column selection and renaming. The resolved mapping is snapshotted into the export manifest.
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ExportFieldMappingColumn'
    ExportFieldMappingColumn:
      type: object
      additionalProperties: false
      required: [source, columnName]
      properties:
        source:
          type: string
          minLength: 1
          description: Canonical business export source column, for example task_id, item.prompt, or answer.label.
        columnName:
          type: string
          minLength: 1
          description: Output column name written to CSV/Excel.
        included:
          type: boolean
          default: true
    RecomputeRuleRequest:
      type: object
      properties:
        taskId:
          type: integer
          format: int64
        mode:
          type: string
          enum: [batch, lazy_probe]
          default: batch
        reason:
          type: string
    RecomputeJob:
      type: object
      required: [id, ruleId, status]
      properties:
        id:
          type: integer
          format: int64
        ruleId:
          type: integer
          format: int64
        status:
          type: string
          enum: [queued, running, completed, failed]
        affectedSubmissionCount:
          type: integer
    ExportSnapshot:
      type: object
      required: [id, exportJobId, taskId, fileHash, manifestHash, sourceStateHash, objectKey, fileManifest, recordCounts, canonicalizationVersion, generatedAt]
      properties:
        id:
          type: integer
          format: int64
        exportJobId:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        fileHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        manifestHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        sourceStateHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        objectKey:
          type: string
        fileManifest:
          type: array
          items:
            $ref: '#/components/schemas/ExportFileEntry'
        recordCounts:
          type: object
          additionalProperties:
            type: integer
        fieldMappingSnapshot:
          type: object
          additionalProperties: true
        canonicalizationVersion:
          type: string
        generatedAt:
          type: string
        archivedAt:
          type: string
          nullable: true
    ExportJob:
      type: object
      required: [id, taskId, requestedBy, format, status, downloadCount, createdAt]
      properties:
        id:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        requestedBy:
          type: integer
          format: int64
        format:
          type: string
        status:
          type: string
          enum: [created, queued, running, succeeded, failed]
        parameters:
          type: object
          additionalProperties: true
        fileKey:
          type: string
          nullable: true
        fileSize:
          type: integer
          format: int64
          nullable: true
        downloadCount:
          type: integer
        createdAt:
          type: string
        startedAt:
          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
    ExportFileEntry:
      type: object
      required: [name, sha256, lines, sizeBytes]
      properties:
        name:
          type: string
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        lines:
          type: integer
        sizeBytes:
          type: integer
          format: int64
    ExportSnapshotDiff:
      type: object
      required: [equal, baseSnapshotId, compareSnapshotId, hashMatches]
      properties:
        equal:
          type: boolean
        baseSnapshotId:
          type: integer
          format: int64
        compareSnapshotId:
          type: integer
          format: int64
        hashMatches:
          type: object
          required: [fileHash, manifestHash, sourceStateHash]
          properties:
            fileHash:
              type: boolean
            manifestHash:
              type: boolean
            sourceStateHash:
              type: boolean
        fileLevelMatches:
          type: array
          items:
            type: object
            required: [fileName, baseSha256, compareSha256, match]
            properties:
              fileName:
                type: string
              baseSha256:
                type: string
                pattern: '^[a-f0-9]{64}$'
              compareSha256:
                type: string
                pattern: '^[a-f0-9]{64}$'
              match:
                type: boolean
    PagedExportSnapshots:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExportSnapshot'
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
    InternalAiReviewResultRequest:
      type: object
      required: [submissionId, idempotencyKey, result]
      properties:
        submissionId:
          type: integer
          format: int64
        idempotencyKey:
          type: string
        result:
          $ref: '#/components/schemas/InternalAiReviewResult'
    InternalAiReviewContext:
      type: object
      required: [submissionId, idempotencyKey, promptVersion, promptVersionId, providerAdapterVersion, input, inputHash, dimensions, threshold, rejectFloor, passThreshold, rejectThreshold, scoringRuleVersion, businessPrompt, renderedPrompt]
      properties:
        submissionId:
          type: integer
          format: int64
        idempotencyKey:
          type: string
        promptVersion:
          type: string
        promptVersionId:
          type: integer
          format: int64
        aiReviewRuleId:
          type: integer
          format: int64
          nullable: true
        providerAdapterVersion:
          type: string
        input:
          type: object
          additionalProperties: true
        inputHash:
          type: string
        dimensions:
          type: array
          items:
            type: string
        threshold:
          type: string
          format: decimal
        rejectFloor:
          type: string
          format: decimal
        passThreshold:
          type: string
          format: decimal
        rejectThreshold:
          type: string
          format: decimal
        scoringRuleVersion:
          type: string
        businessPrompt:
          type: string
        renderedPrompt:
          type: string
    InternalAiReviewResult:
      type: object
      required: [overallSuggestion, finalScore, dimensionScores, summary]
      properties:
        overallSuggestion:
          type: string
          enum: [pass, reject, manual_review]
        finalScore:
          type: string
          format: decimal
        dimensionScores:
          type: array
          items:
            $ref: '#/components/schemas/DimensionScore'
        summary:
          type: string
        fieldFindings:
          type: array
          items:
            $ref: '#/components/schemas/FieldFinding'
        rawResponse:
          type: string
          nullable: true
        tokenInput:
          type: integer
          nullable: true
        tokenOutput:
          type: integer
          nullable: true
        usage:
          $ref: '#/components/schemas/AiCallUsage'
        latencyMs:
          type: integer
          nullable: true
        modelProvider:
          type: string
        modelName:
          type: string
        responsePayload:
          type: object
          additionalProperties: true
