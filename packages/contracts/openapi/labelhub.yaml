openapi: 3.0.3
info:
  title: LabelHub API
  version: 0.10.0
  description: Contract-first API for the LabelHub modular monolith and AI worker.
servers:
  - url: http://localhost:8080/api
tags:
  - name: Auth
  - name: Users
  - name: Tasks
  - name: Datasets
  - name: Schemas
  - name: Sessions
  - name: AIReview
  - name: LLMProviders
  - name: PromptVersions
  - name: Reviews
  - name: Exports
  - name: AuditLogs
  - name: Platform
  - name: PlatformCost
  - name: Internal
security:
  - bearerAuth: []
paths:
  /llm/providers:
    get:
      tags: [LLMProviders]
      operationId: listLlmProviders
      summary: List platform-managed LLM provider configurations.
      responses:
        '200':
          description: LLM provider configurations visible to the platform administrator.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LlmProviderConfig'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
    post:
      tags: [LLMProviders]
      operationId: createLlmProvider
      summary: Create a platform-managed LLM provider configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderConfigRequest'
      responses:
        '201':
          description: Created provider configuration. Secret plaintext is never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderConfig'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /llm/providers:test-connection:
    post:
      tags: [LLMProviders]
      operationId: testUnsavedLlmProvider
      summary: Test an unsaved LLM provider configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderTestConnectionRequest'
      responses:
        '200':
          description: Connection test result without secret echo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderTestConnectionResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /llm/providers/{providerConfigId}:
    get:
      tags: [LLMProviders]
      operationId: getLlmProvider
      summary: Get one platform-managed LLM provider configuration.
      parameters:
        - $ref: '#/components/parameters/ProviderConfigId'
      responses:
        '200':
          description: Provider configuration. Secret plaintext is never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderConfig'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [LLMProviders]
      operationId: updateLlmProvider
      summary: Update a platform-managed LLM provider configuration.
      parameters:
        - $ref: '#/components/parameters/ProviderConfigId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderConfigRequest'
      responses:
        '200':
          description: Updated provider configuration. Secret plaintext is never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderConfig'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    delete:
      tags: [LLMProviders]
      operationId: deleteLlmProvider
      summary: Delete a platform-managed LLM provider configuration.
      parameters:
        - $ref: '#/components/parameters/ProviderConfigId'
      responses:
        '204':
          description: Provider configuration deleted.
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /llm/providers/{providerConfigId}:test-connection:
    post:
      tags: [LLMProviders]
      operationId: testLlmProvider
      summary: Test a saved LLM provider configuration, optionally overriding the secret for this request.
      parameters:
        - $ref: '#/components/parameters/ProviderConfigId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProviderTestConnectionRequest'
      responses:
        '200':
          description: Connection test result without secret echo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProviderTestConnectionResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth token and role profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new labeler account.
      description: Registration always creates a LABELER account; any role fields outside this schema are ignored server-side.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created account auth token and role profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '409':
          $ref: '#/components/responses/ErrorStateConflict'
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refresh
      summary: Refresh the access token using the HttpOnly refresh cookie.
      description: The refresh token is supplied only through the labelhub_refresh HttpOnly cookie and is never accepted in the request body.
      security: []
      parameters:
        - name: labelhub_refresh
          in: cookie
          required: false
          schema:
            type: string
      responses:
        '200':
          description: New access token and role profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the current refresh token cookie.
      description: Revokes the refresh token referenced by the labelhub_refresh HttpOnly cookie when present and clears the cookie.
      security: []
      parameters:
        - name: labelhub_refresh
          in: cookie
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Refresh token revoked and cookie cleared.
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List registered user accounts for platform administration.
      description: Platform administrators can view active registered accounts without password hashes.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated registered users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUsers'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /users/{userId}:
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Soft delete an active user account.
      description: Platform-admin-only soft delete. The user row and historical evidence references are retained; status becomes deleted.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User account soft-deleted.
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '409':
          $ref: '#/components/responses/ErrorStateConflict'
  /users/{userId}/roles:
    post:
      tags: [Users]
      operationId: grantUserRole
      summary: Grant or revoke a governed business reviewer role.
      description: Platform-admin-only legacy reviewer role adjustment. Only LABELER, REVIEWER, and SENIOR_REVIEWER may be adjusted.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantRoleRequest'
      responses:
        '200':
          description: Updated user role profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUserProfile'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /platform/users/{userId}/roles:
    post:
      tags: [Platform]
      operationId: grantPlatformUserRole
      summary: Grant or revoke a platform-governed user role.
      description: Platform administrators may adjust OWNER, LABELER, REVIEWER, and SENIOR_REVIEWER. PLATFORM_ADMIN and AI_AGENT are never grantable through this endpoint, and platform admins cannot grant roles to themselves.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantRoleRequest'
      responses:
        '200':
          description: Updated user role profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUserProfile'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /platform/cost-metrics:
    get:
      tags: [PlatformCost]
      operationId: getPlatformCostMetrics
      summary: Get platform AI token and stored-cost metrics.
      description: Platform-admin-only factual dashboard over stored ai_calls token and cost facts. It does not recalculate pricing, evaluate users, or mutate AI call records.
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Token and stored-cost metrics grouped by day, model, task, and owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformCostMetrics'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /platform/labor-metrics:
    get:
      tags: [PlatformMetrics]
      operationId: getPlatformLaborMetrics
      summary: Get platform labor count metrics.
      description: Platform-admin-only factual counts over submissions, review actions, and three separate rework signals. It does not read submission answers or review text.
      responses:
        '200':
          description: Labor count metrics grouped by user and rework signal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformLaborMetrics'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /platform/efficiency-metrics:
    get:
      tags: [PlatformMetrics]
      operationId: getPlatformEfficiencyMetrics
      summary: Get platform token reuse and unit-cost facts.
      description: Platform-admin-only factual metrics over ai_calls idempotency keys, cache-hit tokens, and stored cost per data item. It does not recalculate pricing.
      responses:
        '200':
          description: Token reuse and unit-cost facts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformEfficiencyMetrics'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /audit-logs:
    get:
      tags: [AuditLogs]
      operationId: listAuditLogs
      summary: 查询审计日志
      description: 查询平台管理者可见的审计日志。
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: actionTypes
          in: query
          description: Comma-separated audit action types.
          schema:
            type: string
        - name: resourceTypes
          in: query
          description: Comma-separated resource types.
          schema:
            type: string
        - name: actorUserId
          in: query
          schema:
            type: integer
            format: int64
        - name: resourceId
          in: query
          schema:
            type: integer
            format: int64
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditLogs'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /audit-logs/export.csv:
    get:
      tags: [AuditLogs]
      operationId: exportAuditLogs
      summary: 导出审计日志 CSV
      description: 导出平台管理者可见的审计日志 CSV。
      parameters:
        - name: actionTypes
          in: query
          description: Comma-separated audit action types.
          schema:
            type: string
        - name: resourceTypes
          in: query
          description: Comma-separated resource types.
          schema:
            type: string
        - name: actorUserId
          in: query
          schema:
            type: integer
            format: int64
        - name: resourceId
          in: query
          schema:
            type: integer
            format: int64
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit log CSV export.
          content:
            text/csv; charset=utf-8:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '413':
          $ref: '#/components/responses/ErrorPayloadTooLarge'
  /tasks:
    get:
      tags: [Tasks]
      operationId: listTasks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Owner tasks for the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTasks'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
    post:
      tags: [Tasks]
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /tasks/{taskId}:
    get:
      tags: [Tasks]
      operationId: getTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task detail visible to the authenticated Owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [Tasks]
      operationId: updateTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Updated task detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorStateConflict'
    delete:
      tags: [Tasks]
      operationId: deleteTask
      summary: 永久删除 Owner 任务
      description: 永久删除该 task 以及所有 task 范围内的事实数据(sessions、submissions、ai_calls、quality_ledger_entries、verdicts、export_snapshots、task_transitions 等)。本操作覆盖 M6-P0.5 提出的 submission 不可变事实承诺,详细记录见 docs/internal/m6p7-verification.md 的 R8 段。
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '204':
          description: Task permanently deleted.
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /tasks/{taskId}/submissions:
    get:
      tags: [Tasks]
      operationId: listOwnerTaskSubmissions
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Owner-visible submission summaries for a task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOwnerSubmissions'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /tasks/{taskId}/exports:
    post:
      tags: [Exports]
      operationId: createTaskExport
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskExportRequest'
      responses:
        '201':
          description: Async export job accepted and queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    get:
      tags: [Exports]
      operationId: listTaskExports
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: archived
          in: query
          description: When true, list archived snapshots instead of active snapshots.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Export snapshots for the task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedExportSnapshots'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /tasks/{taskId}/transitions:
    get:
      tags: [Tasks]
      operationId: getTaskTransitions
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Append-only task transition history in chronological order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskTransition'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /tasks/marketplace:
    get:
      tags: [Tasks]
      operationId: listMarketplaceTasks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: q
          in: query
          schema:
            type: string
          description: Search task title, description, and tags.
        - name: tag
          in: query
          schema:
            type: string
          description: Match a published task tag exactly.
        - name: hasReward
          in: query
          schema:
            type: boolean
          description: When true, only return tasks with a reward rule.
        - name: deadline
          in: query
          schema:
            type: string
            enum: [day, week]
          description: Limit to tasks whose deadline is within one day or one week.
      responses:
        '200':
          description: Available tasks for labelers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMarketplaceTasks'
  /tasks/{taskId}/transition:
    patch:
      tags: [Tasks]
      operationId: transitionTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskTransitionRequest'
      responses:
        '200':
          description: Updated task state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorStateConflict'
  /tasks/{taskId}/current-dataset:
    patch:
      tags: [Tasks]
      operationId: updateTaskCurrentDataset
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskCurrentDatasetRequest'
      responses:
        '200':
          description: Task current dataset updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
