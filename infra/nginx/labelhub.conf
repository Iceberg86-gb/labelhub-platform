# Production placeholder:
# - Set server_name after ICP/domain cutover.
# - Enable ssl_certificate / ssl_certificate_key and switch compose to 443:443
#   after the certificate is issued.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match the backend multipart cap (spring.servlet.multipart.max-file-size: 10MB) so oversized
    # uploads are rejected at the edge with 413 instead of buffering through to a backend 500.
    client_max_body_size 10m;

    # Security response headers (always, so they also cover error responses).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Enable only after the TLS cutover noted above:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # Keep the liveness/readiness probe public (deploy probes hit this through nginx)...
    location = /api/actuator/health {
        proxy_pass http://api:8080/api/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ...but never expose the rest of actuator (metrics/prometheus/info) or the agent<->api
    # internal API at the public edge. 404 (not 403) so probes can't distinguish blocked from absent.
    location ^~ /api/actuator/ {
        return 404;
    }
    location ^~ /api/internal/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
