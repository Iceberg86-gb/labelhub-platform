services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-labelhub}
      MYSQL_USER: ${MYSQL_USER:-labelhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-labelhub}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-labelhub-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-labelhub}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-labelhub-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/scripts/init.sh"]
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-labelhub}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-labelhub-secret}
      S3_BUCKET: ${S3_BUCKET:-labelhub-exports}
    volumes:
      - ./minio/init.sh:/scripts/init.sh:ro

volumes:
  mysql-data:
  minio-data:
